<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股投信選股儀表板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --red:       #f85149;
      --green:     #3fb950;
      --accent:    #388bfd;
      --header-bg: #1c2128;
      --new:       #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
    .topbar .spacer { flex: 1; }
    .topbar .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .topbar .meta span { color: var(--text); font-weight: 500; }

    /* ── Control bar ── */
    .ctrlbar {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .ctrlbar label { color: var(--muted); font-size: 12px; }

    select, input[type="text"], input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--accent); }
    input[type="text"] { width: 160px; }

    .btn {
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .8; }
    .btn-pause   { background: #da3633; color: #fff; }
    .btn-resume  { background: #238636; color: #fff; }
    .btn-refresh { background: var(--accent); color: #fff; }
    .btn-backup  { background: #6e40c9; color: #fff; }
    .btn-compare { background: #6e40c9; color: #fff; }

    .countdown { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .countdown span { color: var(--text); font-weight: 600; }
    .ctrlbar .spacer { flex: 1; }
    .row-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .row-count span { color: var(--text); font-weight: 600; }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 7px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .filter-bar .f-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .f-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .f-item input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; width: 13px; height: 13px; }
    .f-item input[type="number"]   { width: 64px; padding: 3px 6px; }
    .f-item.active { color: var(--text); }

    /* ── Overview chart ── */
    .overview-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 18px;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .overview-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .overview-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .overview-count { font-size: 11px; color: var(--muted); }
    #overview-svg-wrap { line-height: 0; }

    /* ── Status bar ── */
    #status-bar { padding: 6px 18px; font-size: 12px; display: none; flex-shrink: 0; }
    #status-bar.loading { display: block; color: var(--accent); background: #0c2041; }
    #status-bar.error   { display: block; color: var(--red);    background: #3b1111; }

    /* ── Layout ── */
    .content-wrap { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    .main-area    { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
    .table-wrap   { overflow: auto; padding: 12px 18px 24px; flex: 1; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; white-space: nowrap; }

    thead th {
      background: var(--header-bg);
      border: 1px solid var(--border);
      padding: 7px 10px;
      text-align: center;
      font-weight: 600;
      font-size: 12px;
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
      color: var(--muted);
      z-index: 1;
    }
    thead th:hover { color: var(--text); background: #252c37; }
    thead th.sort-asc::after  { content: ' ▲'; color: var(--accent); }
    thead th.sort-desc::after { content: ' ▼'; color: var(--accent); }
    thead th.no-sort { cursor: default; }
    thead th.no-sort:hover { color: var(--muted); background: var(--header-bg); }

    tbody tr { transition: background .1s; }
    tbody tr:hover { background: #1c2128; }
    tbody td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: right;
    }
    /* left-align text columns */
    tbody td.td-code,
    tbody td.td-name,
    tbody td.td-industry { text-align: left; }
    /* center rank & kbar */
    tbody td.td-rank,
    tbody td.td-kbar { text-align: center; padding: 3px 6px; vertical-align: middle; }
    tbody td.td-kbar svg { display: block; margin: 0 auto; }

    /* Taiwan: pos=紅, neg=綠 */
    .pos  { color: var(--red); }
    .neg  { color: var(--green); }
    .zero { color: var(--muted); }

    /* Rank badges */
    .rank-cell  { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .rank-num   { font-weight: 600; min-width: 22px; text-align: right; }
    .rank-badge { font-size: 11px; font-weight: 700; padding: 1px 3px; border-radius: 4px; }
    .rank-up    { color: var(--red);   background: rgba(248,81,73,.12); }
    .rank-down  { color: var(--green); background: rgba(63,185,80,.12); }
    .rank-new   { color: var(--new);   background: rgba(210,153,34,.12); }

    /* Row highlight: 投信>0 AND 月(YOY)>0 */
    td.code-hl { background: rgba(248,81,73,.22) !important; color: #fff; font-weight: 700; }
    .crown { font-size: 11px; margin-right: 2px; vertical-align: middle; }

    /* Table footer */
    tfoot td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      background: var(--header-bg);
    }

    /* ── Side panel ── */
    .side-panel {
      width: 268px;
      min-width: 268px;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      padding: 14px 12px;
    }
    @media (max-width: 640px) {
      .content-wrap { flex-direction: column; overflow: visible; }
      .main-area    { overflow: visible; }
      .table-wrap   { overflow-x: auto; }
      .side-panel {
        width: 100%; min-width: 0;
        border-left: none;
        border-top: 1px solid var(--border);
        padding: 14px 16px;
      }
    }
    .panel-title  { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .panel-sub    { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: .4px;
      text-transform: uppercase; padding: 5px 0 6px;
      border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }
    .section-label.in  { color: var(--red); }
    .section-label.out { color: var(--green); margin-top: 14px; }

    .flow-item     { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 12px; }
    .flow-name     { width: 80px; min-width: 80px; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .flow-bar-wrap { flex: 1; background: var(--bg); border-radius: 3px; height: 7px; overflow: hidden; }
    .flow-bar      { height: 100%; border-radius: 3px; min-width: 2px; }
    .flow-bar.bar-in  { background: var(--red); }
    .flow-bar.bar-out { background: var(--green); }
    .flow-val      { font-size: 11px; font-weight: 600; min-width: 46px; text-align: right; white-space: nowrap; }
    .flow-val.in   { color: var(--red); }
    .flow-val.out  { color: var(--green); }
    .panel-empty   { color: var(--muted); font-size: 12px; text-align: center; padding: 20px 0; }


    /* ── History bar ── */
    .histbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .histbar .h-label { color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; white-space: nowrap; }
    .hist-btn {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .hist-btn:hover  { border-color: var(--accent); color: var(--text); }
    .hist-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .hist-btn.today  { border-color: var(--green); color: var(--green); }
    .hist-btn.today.active { background: var(--green); border-color: var(--green); color: #fff; }
    .hist-btn.backup-snap  { border-color: #6e40c9; color: #a371f7; }
    .hist-btn.backup-snap.active { background: #6e40c9; border-color: #6e40c9; color: #fff; }
    .hist-viewing { font-size: 12px; color: var(--new); font-weight: 600; margin-left: 6px; }

    /* ── Industry tooltip ── */
    .flow-item { position: relative; cursor: default; }
    .ind-tooltip {
      display: none;
      position: fixed;
      z-index: 9999;
      background: #1c2128;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      pointer-events: none;
    }
    .ind-tooltip.visible { display: block; }
    .ind-tooltip .tt-title { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
    .ind-tooltip table { width: 100%; border-collapse: collapse; }
    .ind-tooltip td { padding: 3px 6px; font-size: 12px; border-bottom: 1px solid var(--border); }
    .ind-tooltip tr:last-child td { border-bottom: none; }
    .ind-tooltip td:first-child { color: var(--accent); font-weight: 600; min-width: 46px; }
    .ind-tooltip td:nth-child(2) { color: var(--text); }
    .ind-tooltip td:nth-child(3) { text-align: right; font-weight: 600; min-width: 52px; }

    /* K-bar hover tooltip */
    #kbar-tooltip {
      display: none;
      position: fixed;
      z-index: 9998;
      background: #1c2128;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12px;
      color: var(--text);
      pointer-events: none;
      min-width: 170px;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
    }
    #kbar-tooltip.visible { display: block; }
    .kt-code  { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
    .kt-row   { display: flex; justify-content: space-between; gap: 14px;
                padding: 2px 0; border-bottom: 1px solid #21262d; }
    .kt-row:last-child { border-bottom: none; }
    .kt-label { color: var(--muted); }
    .kt-val   { font-weight: 600; }

    footer {
      text-align: center; padding: 10px; color: var(--muted);
      font-size: 11px; border-top: 1px solid var(--border); flex-shrink: 0;
    }

    /* ── Tab nav ── */
    .tabbar {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 0 18px;
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-pane { display: none; flex: 1; flex-direction: column; min-height: 0; overflow: hidden; }
    .tab-pane.active { display: flex; }

    /* ── Sectors tab ── */
    .sectors-toolbar {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .sectors-hint { font-size: 12px; color: var(--muted); }
    .btn-add-sector { background: #238636; color: #fff; }

    .sectors-grid {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .sector-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .sector-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .sector-name-input {
      flex: 1;
      font-size: 14px;
      font-weight: 700;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      padding: 3px 0;
      outline: none;
    }
    .sector-name-input:focus { border-bottom-color: var(--accent); }
    .btn-del-sector {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .btn-del-sector:hover { background: rgba(248,81,73,.15); color: var(--red); }

    .sector-codes {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .sector-code-input {
      flex: 1;
      min-width: 0;
      text-align: center;
      font-size: 12px;
      padding: 4px 3px;
    }

    .sector-chart {
      overflow-x: auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    /* Drag handle */
    .drag-handle {
      cursor: grab;
      color: var(--muted);
      font-size: 15px;
      padding: 0 4px 0 0;
      user-select: none;
      flex-shrink: 0;
      line-height: 1;
      touch-action: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .sector-card.dragging  { opacity: 0.4; }
    .sector-card.drag-over { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

    /* Watchlist card: full grid width + wrapping code inputs */
    .watchlist-card { grid-column: 1 / -1; }
    .watch-codes { flex-wrap: wrap !important; }
    .watch-codes .sector-code-input { flex: none; width: 64px; }

    /* 觀察 / watch button */
    .btn-watch { background: #1f6feb; color: #fff; }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>📊 台股投信選股儀表板</h1>
  <div class="spacer"></div>
  <div class="meta">資料來源：HiStock ✕ Wespai</div>
  <div class="meta">最後更新：<span id="last-updated">—</span></div>
</div>

<!-- Tab nav -->
<div class="tabbar">
  <button class="tab-btn active" data-tab="ranking">排行榜</button>
  <button class="tab-btn" data-tab="sectors">類股K棒</button>
</div>

<div id="tab-ranking" class="tab-pane active">
<!-- Control bar -->
<div class="ctrlbar">
  <label>刷新間隔</label>
  <select id="interval-select">
    <option value="60">1 分鐘</option>
    <option value="300" selected>5 分鐘</option>
  </select>
  <button class="btn btn-pause" id="btn-toggle">⏸ 暫停</button>
  <button class="btn btn-refresh" id="btn-now">↻ 立即刷新</button>
  <div class="countdown">下次刷新：<span id="countdown-val">—</span> 秒</div>
  <div class="spacer"></div>
  <button class="btn btn-watch"   id="btn-watch"   title="將篩選結果加入類股K棒觀察">👁 列入觀察</button>
  <button class="btn btn-compare" id="btn-compare" title="將當前成交值排行榜複製到對照排行榜">📋 複製到對照排行榜</button>
  <div class="row-count">顯示 <span id="row-count">0</span> 筆</div>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <span class="f-label">篩選條件</span>
  <label class="f-item" id="fl-change">
    <input type="checkbox" id="f-change-en"> 漲跌幅 &gt;
    <input type="number" id="f-change-val" value="5" step="0.1"> %
  </label>
  <label class="f-item" id="fl-ituf">
    <input type="checkbox" id="f-ituf-en"> 投信 ≥ 0
  </label>
  <label class="f-item" id="fl-yoy">
    <input type="checkbox" id="f-yoy-en"> 月(YOY) ≥
    <input type="number" id="f-yoy-val" value="0" step="1"> %
  </label>
  <label class="f-item" id="fl-yoy1">
    <input type="checkbox" id="f-yoy1-en"> 月-1(YOY) ≥
    <input type="number" id="f-yoy1-val" value="0" step="1"> %
  </label>
  <label class="f-item" id="fl-gap">
    <input type="checkbox" id="f-gap-en"> 跳空 ≥
    <input type="number" id="f-gap-val" value="2.5" step="0.1"> %
  </label>
</div>

<!-- History bar (moved above table) -->
<div class="histbar">
  <span class="h-label">資料檢視</span>
  <div id="hist-btns" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  <span class="hist-viewing" id="hist-viewing"></span>
</div>

<!-- Overview K-bar chart (filtered stocks sorted by 漲跌幅) -->
<div class="overview-wrap" id="overview-wrap">
  <div class="overview-header">
    <span class="overview-title">篩選結果 K棒總覽</span>
    <span class="overview-count">（依漲跌幅排列）<span id="overview-count"></span></span>
  </div>
  <div id="overview-svg-wrap"></div>
</div>

<!-- Status bar -->
<div id="status-bar"></div>

<!-- Content -->
<div class="content-wrap">
  <div class="main-area">
    <div class="table-wrap">
      <table id="stock-table">
        <thead>
          <tr>
            <th class="no-sort" style="width:22px">K棒</th>
            <th data-col="排序">排序</th>
            <th data-col="代號">代號</th>
            <th data-col="名稱">名稱</th>
            <th data-col="市場">市場</th>
            <th data-col="股價">股價</th>
            <th data-col="漲跌幅">漲跌幅%</th>
            <th data-col="外資">外資金額(千萬)</th>
            <th data-col="投信">投信金額(千萬)</th>
            <th data-col="月(YOY)">月(YOY)%</th>
            <th data-col="月-1(YOY)">月-1(YOY)%</th>
            <th data-col="開盤">開盤</th>
            <th data-col="資金(億)">資金(億)</th>
            <th data-col="產業類型">產業類型</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="14" style="text-align:center;padding:40px;color:var(--muted)">載入中…</td></tr>
        </tbody>
        <tfoot>
          <tr><td colspan="14" id="tfoot-count" style="text-align:right">共 0 筆</td></tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- Side panel -->
  <div class="side-panel">
    <div class="panel-title">金流產業分析</div>
    <div class="panel-sub">依資金(億)統計，漲跌幅方向分流</div>
    <div class="section-label in">▲ 資金流入前5大產業</div>
    <div id="inflow-list"><div class="panel-empty">—</div></div>
    <div class="section-label out">▼ 資金流出前5大產業</div>
    <div id="outflow-list"><div class="panel-empty">—</div></div>
  </div>
</div>



</div><!-- /tab-ranking -->

<!-- Sectors tab -->
<div id="tab-sectors" class="tab-pane">
  <div class="sectors-toolbar">
    <button class="btn btn-add-sector" id="btn-add-sector">+ 新增類股</button>
    <span class="sectors-hint">資料來源：即時排行榜（需先載入資料）</span>
  </div>

  function getZuqun(code, industry) {
    // 1. 先查個股代號
    const cq = CODE_ZUQUN[String(code)];
    if (cq) return cq;
    // 2. 再比對產業類型關鍵字
    const ind = industry || '';
    for (const rule of INDUSTRY_ZUQUN) {
      if (rule.kw.some(k => ind.includes(k))) return `${rule.e} ${rule.n}`;
    }
    return `📦 ${ind || '其他'}`;

  // ── DOM ──
  const tbody       = document.getElementById('table-body');
  const tfootCount  = document.getElementById('tfoot-count');
  const lastUpdated = document.getElementById('last-updated');
  const countdownEl = document.getElementById('countdown-val');
  const rowCount    = document.getElementById('row-count');
  const statusBar   = document.getElementById('status-bar');
  const btnToggle   = document.getElementById('btn-toggle');
  const btnNow      = document.getElementById('btn-now');
  const intervalSel = document.getElementById('interval-select');

  const fChangeEn  = document.getElementById('f-change-en');
  const fChangeVal = document.getElementById('f-change-val');
  const fItufEn    = document.getElementById('f-ituf-en');
  const fYoyEn     = document.getElementById('f-yoy-en');
  const fYoyVal    = document.getElementById('f-yoy-val');
  const fYoy1En    = document.getElementById('f-yoy1-en');
  const fYoy1Val   = document.getElementById('f-yoy1-val');
  const fGapEn     = document.getElementById('f-gap-en');
  const fGapVal    = document.getElementById('f-gap-val');

  // ── Mini K-bar SVG ──
  function kbarSVG(open, high, low, close) {
    if (!open || !high || !low || !close || high <= low) return '';
    const W = 12, H = 28, pad = 2;
    const range = high - low;
    const toY   = v => pad + (high - v) / range * (H - 2 * pad);
    const color = close >= open ? 'var(--red)' : 'var(--green)';
    const yH    = toY(high);
    const yL    = toY(low);
    const yBT   = toY(Math.max(open, close));
    const yBB   = toY(Math.min(open, close));
    const bodyH = Math.max(yBB - yBT, 1.5);
    const cx    = W / 2;
    return `<svg width="${W}" height="${H}" style="display:block;overflow:visible">` +
      `<line x1="${cx}" y1="${yH}" x2="${cx}" y2="${yBT}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>` +
      `<rect x="1.5" y="${yBT}" width="${W - 3}" height="${bodyH}" fill="${color}" rx="0.5"/>` +
      `<line x1="${cx}" y1="${yBB}" x2="${cx}" y2="${yL}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>` +
      `</svg>`;
  }

  // ── Fetch ──
  async function fetchStocks() {
    setStatus('loading', '資料抓取中，請稍候…');
    try {
      const res  = await fetch('/api/stocks');
      const json = await res.json();
      if (!json.success) throw new Error(json.error || '未知錯誤');

      const newRanks = {};
      json.data.forEach(r => { newRanks[r['代號']] = r['排序']; });

      allData = json.data;
      currentTradingDate = json.date;   // last trading day from server
      lastUpdated.textContent = json.updated_at;

      renderTable();
      renderIndustryPanel();
      renderAllSectorCharts();
      setStatus('');
      prevRanks = newRanks;
      loadCompareStatus();
      loadCrownRef();
    } catch (e) {
      setStatus('error', '❌ 抓取失敗：' + e.message);
    }
    countdown = +intervalSel.value;
    countdownEl.textContent = countdown;
  }

  function setStatus(type, msg = '') {
    statusBar.className = type;
    statusBar.textContent = msg;
  }


  // ── Rank badge ──
  function rankBadge(code, cur) {
    if (!Object.keys(prevRanks).length) return '';
    const prev = prevRanks[code];
    if (prev === undefined) return '<span class="rank-badge rank-new">NEW</span>';
    const d = prev - cur;
    if (d === 0) return '';
    return d > 0
      ? `<span class="rank-badge rank-up">▲${d}</span>`
      : `<span class="rank-badge rank-down">▼${Math.abs(d)}</span>`;
  }

  // ── Gap% helper ──
  function calcGapPct(r) {
    const close = r['股價'], chg = r['漲跌幅'], open = r['開盤'];
    if (!close || chg == null || !open) return 0;
    const prevClose = close / (1 + chg / 100);
    return (open - prevClose) / prevClose * 100;
  }

  // ── Condition filters ──
  function applyCondFilters(rows) {
    if (fChangeEn.checked && fChangeVal.value !== '') {
      const t = parseFloat(fChangeVal.value);
      if (!isNaN(t)) rows = rows.filter(r => (r['漲跌幅'] ?? 0) > t);
    }
    if (fItufEn.checked) rows = rows.filter(r => (r['投信'] ?? 0) >= 0);
    if (fYoyEn.checked && fYoyVal.value !== '') {
      const t = parseFloat(fYoyVal.value);
      if (!isNaN(t)) rows = rows.filter(r => (r['月(YOY)'] ?? 0) >= t);
    }
    if (fYoy1En.checked && fYoy1Val.value !== '') {
      const t = parseFloat(fYoy1Val.value);
      if (!isNaN(t)) rows = rows.filter(r => (r['月-1(YOY)'] ?? 0) >= t);
    }
    if (fGapEn.checked && fGapVal.value !== '') {
      const t = parseFloat(fGapVal.value);
      if (!isNaN(t)) rows = rows.filter(r => calcGapPct(r) >= t);
    }
    return rows;
  }

  // ── Overview K-bar chart ──
  function buildOverviewSVG(rows, containerW) {
    const chartH = 130, colW = 44, padL = 28, padB = 46;
    const n = rows.length;
    // SVG always fills the container; candles sit from the left
    const svgW = Math.max(padL + n * colW, containerW);
    const svgH = chartH + padB;
    const yScale = pct => chartH * (10 - Math.max(-10, Math.min(10, pct))) / 20;
    const parts = [];

    // Full-width background + grid
    parts.push(`<rect x="${padL}" y="0" width="${svgW - padL}" height="${chartH}" fill="#0d1117"/>`);

    [-10, -5, 0, 5, 10].forEach(pct => {
      const y = yScale(pct).toFixed(1);
      const isZero = pct === 0;
      parts.push(`<line x1="${padL}" y1="${y}" x2="${svgW}" y2="${y}" stroke="${isZero ? '#555' : '#1e242c'}" stroke-width="${isZero ? 1.5 : 1}"/>`);
      parts.push(`<text x="${padL - 3}" y="${(+y + 3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#555">${pct}</text>`);
    });

    // Candles left-to-right (already sorted by 漲跌幅)
    rows.forEach((r, i) => {
      const cx   = padL + i * colW + colW / 2;
      const name = (r['名稱'] || r['代號'] || '').slice(0, 3);
      const lx   = cx + 4, ly = chartH + 8;
      parts.push(`<text transform="rotate(-45 ${lx} ${ly})" x="${lx}" y="${ly}" text-anchor="start" font-size="10" fill="#8b949e">${name}</text>`);

      const open = r['開盤'], high = r['最高'], low = r['最低'], close = r['股價'], chg = r['漲跌幅'];
      if (!open || !high || !low || !close || chg == null) return;

      const prev    = close / (1 + chg / 100);
      const openPct = (open - prev) / prev * 100;
      const highPct = (high - prev) / prev * 100;
      const lowPct  = (low  - prev) / prev * 100;

      const yO = yScale(openPct), yC = yScale(chg);
      const yH = yScale(highPct), yL = yScale(lowPct);
      const bTop = Math.min(yO, yC), bBot = Math.max(yO, yC);
      const bH   = Math.max(bBot - bTop, 2);
      const bw   = 12;
      const isUp = chg >= openPct;
      const color = isUp ? '#f85149' : '#3fb950';

      parts.push(`<line x1="${cx}" y1="${yH.toFixed(1)}" x2="${cx}" y2="${bTop.toFixed(1)}" stroke="${color}" stroke-width="1.5"/>`);
      parts.push(`<rect x="${(cx - bw/2).toFixed(1)}" y="${bTop.toFixed(1)}" width="${bw}" height="${bH.toFixed(1)}" fill="${color}" rx="1"/>`);
      parts.push(`<line x1="${cx}" y1="${bBot.toFixed(1)}" x2="${cx}" y2="${yL.toFixed(1)}" stroke="${color}" stroke-width="1.5"/>`);
    });

    // Transparent hover rects (on top of everything)
    rows.forEach((r, i) => {
      parts.push(`<rect data-idx="${i}" x="${padL + i * colW}" y="0" width="${colW}" height="${chartH}" fill="transparent" style="cursor:crosshair"/>`);
    });

    return `<svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">${parts.join('')}</svg>`;
  }

  function renderOverviewChart() {
    let rows = allData.slice();
    rows = applyCondFilters(rows);
    rows.sort((a, b) => (b['漲跌幅'] ?? 0) - (a['漲跌幅'] ?? 0));
    document.getElementById('overview-count').textContent = rows.length ? ` ${rows.length} 筆` : '';
    overviewRows = rows;
    const wrap = document.getElementById('overview-svg-wrap');
    const containerW = document.getElementById('overview-wrap').clientWidth - 36;
    wrap.innerHTML = rows.length ? buildOverviewSVG(rows, containerW) : '';

    // Attach hover events via delegation on the SVG
    const svg = wrap.querySelector('svg');
    if (svg) {
      svg.addEventListener('mousemove', e => {
        const target = e.target.closest ? e.target.closest('[data-idx]') : null;
        if (!target) { hideKbarTip(); return; }
        const r = overviewRows[parseInt(target.dataset.idx)];
        if (r) showKbarTip(e, r);
      });
      svg.addEventListener('mouseleave', hideKbarTip);
    }
  }

  // ── Overview K-bar tooltip ──
  const kbarTip = document.getElementById('kbar-tooltip');

  function showKbarTip(e, r) {
    const chg  = r['漲跌幅'] ?? 0;
    const cls  = chg > 0 ? 'pos' : chg < 0 ? 'neg' : 'zero';
    const sign = chg > 0 ? '+' : '';
    const fmt  = v => v != null ? v.toFixed(2) + '%' : '—';
    const fmtN = v => v != null ? v.toFixed(1) : '—';
    kbarTip.innerHTML =
      `<div class="kt-code">${r['代號']} ${r['名稱'] || ''}</div>` +
      `<div class="kt-row"><span class="kt-label">漲跌幅</span><span class="kt-val ${cls}">${sign}${chg.toFixed(2)}%</span></div>` +
      `<div class="kt-row"><span class="kt-label">外資金額</span><span class="kt-val">${r['外資'] != null && r['股價'] != null ? (r['外資'] > 0 ? '+' : '') + (r['外資'] * r['股價'] / 10000).toFixed(2) : '—'}</span></div>` +
      `<div class="kt-row"><span class="kt-label">投信金額</span><span class="kt-val">${r['投信'] != null && r['股價'] != null ? (r['投信'] > 0 ? '+' : '') + (r['投信'] * r['股價'] / 10000).toFixed(2) : '—'}</span></div>` +
      `<div class="kt-row"><span class="kt-label">月YOY</span><span class="kt-val">${fmt(r['月(YOY)'])}</span></div>` +
      `<div class="kt-row"><span class="kt-label">月-1YOY</span><span class="kt-val">${fmt(r['月-1(YOY)'])}</span></div>` +
      `<div class="kt-row"><span class="kt-label">資金</span><span class="kt-val">${fmtN(r['資金(億)'])}億</span></div>` +
      `<div class="kt-row"><span class="kt-label">產業</span><span class="kt-val">${r['產業類型'] || '—'}</span></div>`;
    kbarTip.classList.add('visible');
    moveKbarTip(e);
  }

  function moveKbarTip(e) {
    const pad = 14, W = kbarTip.offsetWidth || 180, H = kbarTip.offsetHeight || 160;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + W > window.innerWidth  - 8) x = e.clientX - W - pad;
    if (y + H > window.innerHeight - 8) y = e.clientY - H - pad;
    kbarTip.style.left = x + 'px';
    kbarTip.style.top  = y + 'px';
  }

  function hideKbarTip() { kbarTip.classList.remove('visible'); }

  // ── Render table ──
  function renderTable() {
    let rows = allData.slice();
    rows = applyCondFilters(rows);

    if (sortCol) {
      rows = [...rows].sort((a, b) => {
        // 投信/外資 sort by monetary value (張 × 股價), not raw lots
        let va, vb;
        if (sortCol === '投信' || sortCol === '外資') {
          va = (a[sortCol] != null && a['股價'] != null) ? a[sortCol] * a['股價'] : null;
          vb = (b[sortCol] != null && b['股價'] != null) ? b[sortCol] * b['股價'] : null;
        } else {
          va = a[sortCol]; vb = b[sortCol];
        }
        if (va == null) va = sortDir === 'asc' ?  Infinity : -Infinity;
        if (vb == null) vb = sortDir === 'asc' ?  Infinity : -Infinity;
        if (typeof va === 'number' && typeof vb === 'number')
          return sortDir === 'asc' ? va - vb : vb - va;
        return sortDir === 'asc'
          ? String(va).localeCompare(String(vb), 'zh-TW')
          : String(vb).localeCompare(String(va), 'zh-TW');
      });
    }

    const n = rows.length;
    rowCount.textContent = n;
    tfootCount.textContent = `共 ${n} 筆`;

    if (!n) {
      tbody.innerHTML = '<tr><td colspan="14" style="text-align:center;padding:40px;color:var(--muted)">無符合資料</td></tr>';
      return;
    }

    const DISPLAY = ['排序','代號','名稱','市場','股價','漲跌幅','外資','投信','月(YOY)','月-1(YOY)','開盤','資金(億)','產業類型'];

    tbody.innerHTML = rows.map(r => {
      const open  = r['開盤'];
      const high  = r['最高'];
      const low   = r['最低'];
      const close = r['股價'];

      // K-bar cell
      const kbarCell = `<td class="td-kbar">${kbarSVG(open, high, low, close)}</td>`;

      // Highlight condition: 投信>=0 AND 月(YOY)>0
      const hl = (r['投信'] ?? 0) >= 0 && (r['月(YOY)'] ?? 0) > 0;

      const cells = DISPLAY.map(col => {
        const val = r[col];

        if (col === '排序') {
          return `<td class="td-rank"><div class="rank-cell"><span class="rank-num">${val ?? '—'}</span>${rankBadge(r['代號'], val)}</div></td>`;
        }
        if (col === '代號') {
          const crown = (prevHistCodes.size > 0 && !prevHistCodes.has(String(val))) ? '<span class="crown">👑</span>' : '';
          return `<td class="td-code${hl ? ' code-hl' : ''}">${crown}${val ?? '—'}</td>`;
        }
        if (col === '名稱')    return `<td class="td-name">${val ?? '—'}</td>`;
        if (col === '市場')    return `<td class="td-market" style="font-size:11px;color:var(--muted)">${val ?? '—'}</td>`;
        if (col === '產業類型') {
          const zq = getZuqun(r['代號'], val);
          return `<td class="td-industry" title="${val ?? ''}">${zq}</td>`;
        }

        if (val === null || val === undefined) return `<td class="zero">—</td>`;

        if ((col === '外資' || col === '投信') && typeof val === 'number') {
          const price = r['股價'];
          const amt   = (price != null) ? (val * price / 10000) : null;
          const cls   = val > 0 ? 'pos' : val < 0 ? 'neg' : 'zero';
          const sign  = val > 0 ? '+' : '';
          const disp  = amt != null ? `${sign}${amt.toFixed(2)}` : `${sign}${val}張`;
          return `<td class="${cls}">${disp}</td>`;
        }
        if (SIGN_COLS.has(col) && typeof val === 'number') {
          const cls  = val > 0 ? 'pos' : val < 0 ? 'neg' : 'zero';
          const sign = val > 0 ? '+' : '';
          return `<td class="${cls}">${sign}${val.toFixed(2)}</td>`;
        }
        if (NUM_COLS.has(col) && typeof val === 'number') {
          return `<td>${val.toLocaleString('zh-TW', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>`;
        }
        return `<td>${val}</td>`;
      });

      return `<tr>${kbarCell}${cells.join('')}</tr>`;
    }).join('');
    renderOverviewChart();
  }

  // ── Industry flow panel (based on 資金(億) + 漲跌幅 direction) ──
  function renderIndustryPanel() {
    if (!allData.length) return;

    const map = {};
    allData.forEach(r => {
      const ind = getZuqun(r['代號'], r['產業類型']);
      if (!map[ind]) map[ind] = { capital: 0, changeSum: 0, count: 0 };
      map[ind].capital   += r['資金(億)'] ?? 0;
      map[ind].changeSum += r['漲跌幅']   ?? 0;
      map[ind].count++;
    });

    const entries = Object.entries(map).map(([ind, v]) => ({
      ind,
      capital:   v.capital,
      avgChange: v.count ? v.changeSum / v.count : 0,
    }));

    const inflow  = entries.filter(v => v.avgChange > 0)
                           .sort((a, b) => b.capital - a.capital)
                           .slice(0, 5);
    const outflow = entries.filter(v => v.avgChange <= 0)
                           .sort((a, b) => b.capital - a.capital)
                           .slice(0, 5);

    const maxCap = Math.max(...entries.map(v => v.capital), 1);

    function renderList(list, cls) {
      if (!list.length) return '<div class="panel-empty">無資料</div>';
      return list.map(v => {
        const pct  = Math.round((v.capital / maxCap) * 100);
        const sign = cls === 'in' ? '▲' : '▼';
        return `<div class="flow-item" data-ind="${encodeURIComponent(v.ind)}">
          <div class="flow-name">${v.ind}</div>
          <div class="flow-bar-wrap"><div class="flow-bar bar-${cls}" style="width:${pct}%"></div></div>
          <div class="flow-val ${cls}">${sign}${v.capital.toFixed(1)}億</div>
        </div>`;
      }).join('');
    }

    document.getElementById('inflow-list').innerHTML  = renderList(inflow,  'in');
    document.getElementById('outflow-list').innerHTML = renderList(outflow, 'out');

    // Attach tooltip events
    document.querySelectorAll('.flow-item[data-ind]').forEach(el => {
      el.addEventListener('mouseenter', e => showIndTooltip(e, decodeURIComponent(el.dataset.ind)));
      el.addEventListener('mousemove',  e => moveTooltip(e));
      el.addEventListener('mouseleave', hideIndTooltip);
    });
  }

  // Variable-N K-bar SVG (works for both fixed-5 and watchlist cards)
  function sectorKBarSVGN(stocksInfo) {
    const n = Math.max(1, stocksInfo.length);
    const chartH = 140, colW = 52, padL = 28, padB = 22;
    const svgW   = padL + n * colW;
    const svgH   = chartH + padB;
    const yScale = pct => chartH * (10 - Math.max(-10, Math.min(10, pct))) / 20;
    const parts  = [];

    parts.push(`<rect x="${padL}" y="0" width="${n * colW}" height="${chartH}" fill="#0d1117"/>`);
    [-10, -5, 0, 5, 10].forEach(pct => {
      const y = yScale(pct).toFixed(1);
      const isZero = pct === 0;
      parts.push(`<line x1="${padL}" y1="${y}" x2="${svgW}" y2="${y}" stroke="${isZero ? '#555' : '#1e242c'}" stroke-width="${isZero ? 1.5 : 1}"/>`);
      parts.push(`<text x="${padL - 3}" y="${(+y + 3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#555">${pct}</text>`);
    });

    for (let i = 0; i < n; i++) {
      const cx = padL + i * colW + colW / 2;
      const s  = stocksInfo[i];
      if (!s || !s.code) continue;

      const label = (s.name || s.code).slice(0, 3);
      parts.push(`<text x="${cx}" y="${svgH - 4}" text-anchor="middle" font-size="10" fill="#8b949e">${label}</text>`);

      if (!s.data) {
        parts.push(`<text x="${cx}" y="${(chartH / 2 + 4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#444">N/A</text>`);
        continue;
      }
      const d = s.data;
      const open = d['開盤'], high = d['最高'], low = d['最低'], close = d['股價'], chg = d['漲跌幅'];
      if (!open || !high || !low || !close || chg == null) continue;

      const prev    = close / (1 + chg / 100);
      const openPct = (open - prev) / prev * 100;
      const highPct = (high - prev) / prev * 100;
      const lowPct  = (low  - prev) / prev * 100;

      const yO = yScale(openPct), yC = yScale(chg);
      const yH = yScale(highPct), yL = yScale(lowPct);
      const bTop = Math.min(yO, yC), bBot = Math.max(yO, yC);
      const bH   = Math.max(bBot - bTop, 2);
      const bw   = 9;
      const isUp = chg >= openPct;
      const color = isUp ? '#f85149' : '#3fb950';

      parts.push(`<line x1="${cx}" y1="${yH.toFixed(1)}" x2="${cx}" y2="${bTop.toFixed(1)}" stroke="${color}" stroke-width="1.5"/>`);
      parts.push(`<rect x="${(cx - bw/2).toFixed(1)}" y="${bTop.toFixed(1)}" width="${bw}" height="${bH.toFixed(1)}" fill="${color}" rx="1"/>`);
      parts.push(`<line x1="${cx}" y1="${bBot.toFixed(1)}" x2="${cx}" y2="${yL.toFixed(1)}" stroke="${color}" stroke-width="1.5"/>`);
    }
    return `<svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">${parts.join('')}</svg>`;
  }

  // ── Drag-to-reorder ──
  let touchDragState = null;

  function reorderSectors(fromIdx, toIdx) {
    if (fromIdx === toIdx || fromIdx < 0 || toIdx < 0 ||
        fromIdx >= sectors.length || toIdx >= sectors.length) return;
    const [moved] = sectors.splice(fromIdx, 1);
    sectors.splice(toIdx > fromIdx ? toIdx - 1 : toIdx, 0, moved);
    saveSectors();
    renderSectorsGrid();
  }

  function addDragToCard(card, idx) {
    const handle = card.querySelector('.drag-handle');
    if (!handle) return;

    // Desktop: set draggable only when handle is held
    handle.addEventListener('mousedown', () => { card.draggable = true; });
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', String(idx));
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.draggable = false;
      card.classList.remove('dragging');
      document.querySelectorAll('.sector-card').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      document.querySelectorAll('.sector-card').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      const to   = parseInt(card.dataset.idx);
      reorderSectors(from, to);
    });

    // Mobile: long-press on handle to drag
    handle.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      const origRect = card.getBoundingClientRect();
      touchDragState = {
        card, idx,
        startX: touch.clientX, startY: touch.clientY,
        origRect, ghost: null, overCard: null,
        timer: setTimeout(() => {
          if (!touchDragState || touchDragState.card !== card) return;
          const ghost = card.cloneNode(true);
          Object.assign(ghost.style, {
            position: 'fixed', opacity: '0.85', pointerEvents: 'none',
            zIndex: '9999', width: origRect.width + 'px',
            top: origRect.top + 'px', left: origRect.left + 'px'
          });
          document.body.appendChild(ghost);
          touchDragState.ghost = ghost;
          card.classList.add('dragging');
        }, 380)
      };
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      if (!touchDragState?.ghost) return;
      e.preventDefault();
      const touch = e.touches[0];
      const dx = touch.clientX - touchDragState.startX;
      const dy = touch.clientY - touchDragState.startY;
      touchDragState.ghost.style.left = (touchDragState.origRect.left + dx) + 'px';
      touchDragState.ghost.style.top  = (touchDragState.origRect.top  + dy) + 'px';
      touchDragState.ghost.style.display = 'none';
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      touchDragState.ghost.style.display = '';
      const over = el?.closest('.sector-card');
      document.querySelectorAll('.sector-card').forEach(c => c.classList.remove('drag-over'));
      if (over && over !== card) { over.classList.add('drag-over'); touchDragState.overCard = over; }
      else touchDragState.overCard = null;
    }, { passive: false });

    handle.addEventListener('touchend', () => {
      if (!touchDragState) return;
      clearTimeout(touchDragState.timer);
      if (touchDragState.ghost) {
        touchDragState.ghost.remove();
        card.classList.remove('dragging');
        document.querySelectorAll('.sector-card').forEach(c => c.classList.remove('drag-over'));
        if (touchDragState.overCard) {
          reorderSectors(idx, parseInt(touchDragState.overCard.dataset.idx));
        }
      }
      touchDragState = null;
    });
  }

  function createSectorCard(sector, idx) {
    const isWatch = !!sector.isWatchlist;
    const card = document.createElement('div');
    card.className = 'sector-card' + (isWatch ? ' watchlist-card' : '');
    card.dataset.idx = idx;

    const codesHTML = isWatch

          .join('');

    card.innerHTML = `
      <div class="sector-card-header">
        <span class="drag-handle" title="拖曳排序">⠿</span>

      </div>
      <div class="sector-codes${isWatch ? ' watch-codes' : ''}">

    card.querySelector('.sector-name-input').addEventListener('input', e => {
      sectors[idx].name = e.target.value;
      saveSectors();
    });
    card.querySelectorAll('.sector-code-input').forEach((inp, si) => {

  document.getElementById('btn-watch').addEventListener('click', () => {
    const codes = applyCondFilters(allData.slice()).map(r => r['代號']).filter(Boolean);
    if (!codes.length) { alert('目前無篩選結果'); return; }
    const wIdx = sectors.findIndex(s => s.isWatchlist);
    if (wIdx >= 0) {
      sectors[wIdx].stocks = codes;
    } else {
      sectors.unshift({ name: '觀察', stocks: codes, isWatchlist: true });
    }
    saveSectors();
    // Switch to 類股K棒 tab
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelector('.tab-btn[data-tab="sectors"]').classList.add('active');
    document.getElementById('tab-sectors').classList.add('active');
    renderSectorsGrid();
  });

  window.addEventListener('resize', renderOverviewChart);

  // ── Init ──
  fetchStocks();
  startTicker();
  loadCompareStatus();
  loadSectors();   // fetches sector configs from server DB (falls back to localStorage)
</script>
</body>
</html>
