<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股投信選股儀表板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --red:       #f85149;
      --green:     #3fb950;
      --accent:    #388bfd;
      --header-bg: #1c2128;
      --new:       #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
    .topbar .spacer { flex: 1; }
    .topbar .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .topbar .meta span { color: var(--text); font-weight: 500; }

    /* ── Control bar ── */
    .ctrlbar {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .ctrlbar label { color: var(--muted); font-size: 12px; }

    select, input[type="text"], input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--accent); }
    input[type="text"] { width: 160px; }

    .btn {
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .8; }
    .btn-pause   { background: #da3633; color: #fff; }
    .btn-resume  { background: #238636; color: #fff; }
    .btn-refresh { background: var(--accent); color: #fff; }

    .countdown { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .countdown span { color: var(--text); font-weight: 600; }
    .ctrlbar .spacer { flex: 1; }
    .row-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .row-count span { color: var(--text); font-weight: 600; }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 7px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .filter-bar .f-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .f-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .f-item input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; width: 13px; height: 13px; }
    .f-item input[type="number"]   { width: 64px; padding: 3px 6px; }
    .f-item.active { color: var(--text); }

    /* ── Status bar ── */
    #status-bar { padding: 6px 18px; font-size: 12px; display: none; flex-shrink: 0; }
    #status-bar.loading { display: block; color: var(--accent); background: #0c2041; }
    #status-bar.error   { display: block; color: var(--red);    background: #3b1111; }

    /* ── Layout ── */
    .content-wrap { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    .main-area    { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
    .table-wrap   { overflow: auto; padding: 12px 18px 24px; flex: 1; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; white-space: nowrap; }

    thead th {
      background: var(--header-bg);
      border: 1px solid var(--border);
      padding: 7px 10px;
      text-align: center;
      font-weight: 600;
      font-size: 12px;
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
      color: var(--muted);
      z-index: 1;
    }
    thead th:hover { color: var(--text); background: #252c37; }
    thead th.sort-asc::after  { content: ' ▲'; color: var(--accent); }
    thead th.sort-desc::after { content: ' ▼'; color: var(--accent); }
    thead th.no-sort { cursor: default; }
    thead th.no-sort:hover { color: var(--muted); background: var(--header-bg); }

    tbody tr { transition: background .1s; }
    tbody tr:hover { background: #1c2128; }
    tbody td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: right;
    }
    /* left-align text columns */
    tbody td.td-code,
    tbody td.td-name,
    tbody td.td-industry { text-align: left; }
    /* center rank & kbar */
    tbody td.td-rank,
    tbody td.td-kbar { text-align: center; padding: 3px 6px; vertical-align: middle; }
    tbody td.td-kbar svg { display: block; margin: 0 auto; }

    /* Taiwan: pos=紅, neg=綠 */
    .pos  { color: var(--red); }
    .neg  { color: var(--green); }
    .zero { color: var(--muted); }

    /* Rank badges */
    .rank-cell  { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .rank-num   { font-weight: 600; min-width: 22px; text-align: right; }
    .rank-badge { font-size: 11px; font-weight: 700; padding: 1px 3px; border-radius: 4px; }
    .rank-up    { color: var(--red);   background: rgba(248,81,73,.12); }
    .rank-down  { color: var(--green); background: rgba(63,185,80,.12); }
    .rank-new   { color: var(--new);   background: rgba(210,153,34,.12); }

    /* Row highlight: 投信>0 AND 月(YOY)>0 */
    td.code-hl { background: rgba(248,81,73,.22) !important; color: #fff; font-weight: 700; }

    /* Table footer */
    tfoot td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      background: var(--header-bg);
    }

    /* ── Side panel ── */
    .side-panel {
      width: 268px;
      min-width: 268px;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      padding: 14px 12px;
    }
    .panel-title  { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .panel-sub    { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: .4px;
      text-transform: uppercase; padding: 5px 0 6px;
      border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }
    .section-label.in  { color: var(--red); }
    .section-label.out { color: var(--green); margin-top: 14px; }

    .flow-item     { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 12px; }
    .flow-name     { width: 80px; min-width: 80px; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .flow-bar-wrap { flex: 1; background: var(--bg); border-radius: 3px; height: 7px; overflow: hidden; }
    .flow-bar      { height: 100%; border-radius: 3px; min-width: 2px; }
    .flow-bar.bar-in  { background: var(--red); }
    .flow-bar.bar-out { background: var(--green); }
    .flow-val      { font-size: 11px; font-weight: 600; min-width: 46px; text-align: right; white-space: nowrap; }
    .flow-val.in   { color: var(--red); }
    .flow-val.out  { color: var(--green); }
    .panel-empty   { color: var(--muted); font-size: 12px; text-align: center; padding: 20px 0; }


    /* ── Industry tooltip ── */
    .flow-item { position: relative; cursor: default; }
    .ind-tooltip {
      display: none;
      position: fixed;
      z-index: 9999;
      background: #1c2128;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      pointer-events: none;
    }
    .ind-tooltip.visible { display: block; }
    .ind-tooltip .tt-title { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
    .ind-tooltip table { width: 100%; border-collapse: collapse; }
    .ind-tooltip td { padding: 3px 6px; font-size: 12px; border-bottom: 1px solid var(--border); }
    .ind-tooltip tr:last-child td { border-bottom: none; }
    .ind-tooltip td:first-child { color: var(--accent); font-weight: 600; min-width: 46px; }
    .ind-tooltip td:nth-child(2) { color: var(--text); }
    .ind-tooltip td:nth-child(3) { text-align: right; font-weight: 600; min-width: 52px; }

    footer {
      text-align: center; padding: 10px; color: var(--muted);
      font-size: 11px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>📊 台股投信選股儀表板</h1>
  <div class="spacer"></div>
  <div class="meta">資料來源：HiStock ✕ Wespai</div>
  <div class="meta">最後更新：<span id="last-updated">—</span></div>
</div>

<!-- Control bar -->
<div class="ctrlbar">
  <label>刷新間隔</label>
  <select id="interval-select">
    <option value="60">1 分鐘</option>
    <option value="120">2 分鐘</option>
    <option value="300" selected>5 分鐘</option>
    <option value="600">10 分鐘</option>
  </select>
  <button class="btn btn-pause" id="btn-toggle">⏸ 暫停</button>
  <button class="btn btn-refresh" id="btn-now">↻ 立即刷新</button>
  <div class="countdown">下次刷新：<span id="countdown-val">—</span> 秒</div>
  <div class="spacer"></div>
  <label>產業篩選</label>
  <select id="filter-industry"><option value="">全部</option></select>
  <input type="text" id="search-input" placeholder="搜尋代號 / 名稱" />
  <div class="row-count">顯示 <span id="row-count">0</span> 筆</div>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <span class="f-label">篩選條件</span>
  <label class="f-item" id="fl-change">
    <input type="checkbox" id="f-change-en"> 漲跌幅 &gt;
    <input type="number" id="f-change-val" placeholder="0" step="0.1"> %
  </label>
  <label class="f-item" id="fl-ituf">
    <input type="checkbox" id="f-ituf-en"> 投信 ≥ 0
  </label>
  <label class="f-item" id="fl-yoy">
    <input type="checkbox" id="f-yoy-en"> 月(YOY) ≥
    <input type="number" id="f-yoy-val" placeholder="0" step="1"> %
  </label>
  <label class="f-item" id="fl-yoy1">
    <input type="checkbox" id="f-yoy1-en"> 月-1(YOY) ≥
    <input type="number" id="f-yoy1-val" placeholder="0" step="1"> %
  </label>
</div>

<!-- Status bar -->
<div id="status-bar"></div>

<!-- Content -->
<div class="content-wrap">
  <div class="main-area">
    <div class="table-wrap">
      <table id="stock-table">
        <thead>
          <tr>
            <th class="no-sort" style="width:22px">K棒</th>
            <th data-col="排序">排序</th>
            <th data-col="代號">代號</th>
            <th data-col="名稱">名稱</th>
            <th data-col="股價">股價</th>
            <th data-col="漲跌幅">漲跌幅%</th>
            <th data-col="投信">投信</th>
            <th data-col="月(YOY)">月(YOY)%</th>
            <th data-col="月-1(YOY)">月-1(YOY)%</th>
            <th data-col="開盤">開盤</th>
            <th data-col="資金(億)">資金(億)</th>
            <th data-col="產業類型">產業類型</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="12" style="text-align:center;padding:40px;color:var(--muted)">載入中…</td></tr>
        </tbody>
        <tfoot>
          <tr><td colspan="12" id="tfoot-count" style="text-align:right">共 0 筆</td></tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- Side panel -->
  <div class="side-panel">
    <div class="panel-title">金流產業分析</div>
    <div class="panel-sub">依資金(億)統計，漲跌幅方向分流</div>
    <div class="section-label in">▲ 資金流入前5大產業</div>
    <div id="inflow-list"><div class="panel-empty">—</div></div>
    <div class="section-label out">▼ 資金流出前5大產業</div>
    <div id="outflow-list"><div class="panel-empty">—</div></div>
  </div>
</div>


<!-- Industry tooltip -->
<div class="ind-tooltip" id="ind-tooltip">
  <div class="tt-title" id="tt-title">—</div>
  <table id="tt-table"></table>
</div>

<footer>資料僅供參考，不構成投資建議。</footer>

<script>
  // ── State ──
  let allData   = [];
  let prevRanks = {};
  let sortCol   = null;
  let sortDir   = 'asc';
  let isPaused  = false;
  let countdown = 300;
  let tickerHandle = null;

  const SIGN_COLS = new Set(['漲跌幅', '投信', '月(YOY)', '月-1(YOY)']);
  const NUM_COLS  = new Set(['股價', '漲跌幅', '開盤', '資金(億)']);

  // ── DOM ──
  const tbody       = document.getElementById('table-body');
  const tfootCount  = document.getElementById('tfoot-count');
  const lastUpdated = document.getElementById('last-updated');
  const countdownEl = document.getElementById('countdown-val');
  const rowCount    = document.getElementById('row-count');
  const statusBar   = document.getElementById('status-bar');
  const btnToggle   = document.getElementById('btn-toggle');
  const btnNow      = document.getElementById('btn-now');
  const intervalSel = document.getElementById('interval-select');
  const filterInd   = document.getElementById('filter-industry');
  const searchInput = document.getElementById('search-input');

  const fChangeEn  = document.getElementById('f-change-en');
  const fChangeVal = document.getElementById('f-change-val');
  const fItufEn    = document.getElementById('f-ituf-en');
  const fYoyEn     = document.getElementById('f-yoy-en');
  const fYoyVal    = document.getElementById('f-yoy-val');
  const fYoy1En    = document.getElementById('f-yoy1-en');
  const fYoy1Val   = document.getElementById('f-yoy1-val');

  // ── Mini K-bar SVG ──
  function kbarSVG(open, high, low, close) {
    if (!open || !high || !low || !close || high <= low) return '';
    const W = 12, H = 28, pad = 2;
    const range = high - low;
    const toY   = v => pad + (high - v) / range * (H - 2 * pad);
    const color = close >= open ? 'var(--red)' : 'var(--green)';
    const yH    = toY(high);
    const yL    = toY(low);
    const yBT   = toY(Math.max(open, close));
    const yBB   = toY(Math.min(open, close));
    const bodyH = Math.max(yBB - yBT, 1.5);
    const cx    = W / 2;
    return `<svg width="${W}" height="${H}" style="display:block;overflow:visible">` +
      `<line x1="${cx}" y1="${yH}" x2="${cx}" y2="${yBT}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>` +
      `<rect x="1.5" y="${yBT}" width="${W - 3}" height="${bodyH}" fill="${color}" rx="0.5"/>` +
      `<line x1="${cx}" y1="${yBB}" x2="${cx}" y2="${yL}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>` +
      `</svg>`;
  }

  // ── Fetch ──
  async function fetchStocks() {
    setStatus('loading', '資料抓取中，請稍候…');
    try {
      const res  = await fetch('/api/stocks');
      const json = await res.json();
      if (!json.success) throw new Error(json.error || '未知錯誤');

      const newRanks = {};
      json.data.forEach(r => { newRanks[r['代號']] = r['排序']; });

      allData = json.data;
      lastUpdated.textContent = json.updated_at;

      populateIndustryFilter();
      renderTable();
      renderIndustryPanel();
      setStatus('');
      prevRanks = newRanks;
    } catch (e) {
      setStatus('error', '❌ 抓取失敗：' + e.message);
    }
    countdown = +intervalSel.value;
    countdownEl.textContent = countdown;
  }

  function setStatus(type, msg = '') {
    statusBar.className = type;
    statusBar.textContent = msg;
  }

  // ── Industry dropdown ──
  function populateIndustryFilter() {
    const saved = filterInd.value;
    const inds = [...new Set(allData.map(r => r['產業類型']).filter(Boolean))].sort();
    filterInd.innerHTML = '<option value="">全部</option>';
    inds.forEach(ind => {
      const o = document.createElement('option');
      o.value = o.textContent = ind;
      filterInd.appendChild(o);
    });
    filterInd.value = saved;
  }

  // ── Rank badge ──
  function rankBadge(code, cur) {
    if (!Object.keys(prevRanks).length) return '';
    const prev = prevRanks[code];
    if (prev === undefined) return '<span class="rank-badge rank-new">NEW</span>';
    const d = prev - cur;
    if (d === 0) return '';
    return d > 0
      ? `<span class="rank-badge rank-up">▲${d}</span>`
      : `<span class="rank-badge rank-down">▼${Math.abs(d)}</span>`;
  }

  // ── Condition filters ──
  function applyCondFilters(rows) {
    if (fChangeEn.checked && fChangeVal.value !== '') {
      const t = parseFloat(fChangeVal.value);
      if (!isNaN(t)) rows = rows.filter(r => (r['漲跌幅'] ?? 0) > t);
    }
    if (fItufEn.checked) rows = rows.filter(r => (r['投信'] ?? 0) >= 0);
    if (fYoyEn.checked && fYoyVal.value !== '') {
      const t = parseFloat(fYoyVal.value);
      if (!isNaN(t)) rows = rows.filter(r => (r['月(YOY)'] ?? 0) >= t);
    }
    if (fYoy1En.checked && fYoy1Val.value !== '') {
      const t = parseFloat(fYoy1Val.value);
      if (!isNaN(t)) rows = rows.filter(r => (r['月-1(YOY)'] ?? 0) >= t);
    }
    return rows;
  }

  // ── Render table ──
  function renderTable() {
    const industry = filterInd.value;
    const keyword  = searchInput.value.trim().toLowerCase();

    let rows = allData.filter(r => {
      if (industry && r['產業類型'] !== industry) return false;
      if (keyword  && !r['代號'].toLowerCase().includes(keyword)
                   && !(r['名稱'] || '').toLowerCase().includes(keyword)) return false;
      return true;
    });
    rows = applyCondFilters(rows);

    if (sortCol) {
      rows = [...rows].sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (va == null) va = sortDir === 'asc' ?  Infinity : -Infinity;
        if (vb == null) vb = sortDir === 'asc' ?  Infinity : -Infinity;
        if (typeof va === 'number' && typeof vb === 'number')
          return sortDir === 'asc' ? va - vb : vb - va;
        return sortDir === 'asc'
          ? String(va).localeCompare(String(vb), 'zh-TW')
          : String(vb).localeCompare(String(va), 'zh-TW');
      });
    }

    const n = rows.length;
    rowCount.textContent = n;
    tfootCount.textContent = `共 ${n} 筆`;

    if (!n) {
      tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:40px;color:var(--muted)">無符合資料</td></tr>';
      return;
    }

    const DISPLAY = ['排序','代號','名稱','股價','漲跌幅','投信','月(YOY)','月-1(YOY)','開盤','資金(億)','產業類型'];

    tbody.innerHTML = rows.map(r => {
      const open  = r['開盤'];
      const high  = r['最高'];
      const low   = r['最低'];
      const close = r['股價'];

      // K-bar cell
      const kbarCell = `<td class="td-kbar">${kbarSVG(open, high, low, close)}</td>`;

      // Highlight condition: 投信>=0 AND 月(YOY)>0
      const hl = (r['投信'] ?? 0) >= 0 && (r['月(YOY)'] ?? 0) > 0;

      const cells = DISPLAY.map(col => {
        const val = r[col];

        if (col === '排序') {
          return `<td class="td-rank"><div class="rank-cell"><span class="rank-num">${val ?? '—'}</span>${rankBadge(r['代號'], val)}</div></td>`;
        }
        if (col === '代號') {
          return `<td class="td-code${hl ? ' code-hl' : ''}">${val ?? '—'}</td>`;
        }
        if (col === '名稱')    return `<td class="td-name">${val ?? '—'}</td>`;
        if (col === '產業類型') return `<td class="td-industry">${val ?? '—'}</td>`;

        if (val === null || val === undefined) return `<td class="zero">—</td>`;

        if (SIGN_COLS.has(col) && typeof val === 'number') {
          const cls  = val > 0 ? 'pos' : val < 0 ? 'neg' : 'zero';
          const sign = val > 0 ? '+' : '';
          const fmt  = col === '投信' ? val.toString() : `${sign}${val.toFixed(2)}`;
          return `<td class="${cls}">${fmt}</td>`;
        }
        if (NUM_COLS.has(col) && typeof val === 'number') {
          return `<td>${val.toLocaleString('zh-TW', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>`;
        }
        return `<td>${val}</td>`;
      });

      return `<tr>${kbarCell}${cells.join('')}</tr>`;
    }).join('');
  }

  // ── Industry flow panel (based on 資金(億) + 漲跌幅 direction) ──
  function renderIndustryPanel() {
    if (!allData.length) return;

    const map = {};
    allData.forEach(r => {
      const ind = r['產業類型'] || '未分類';
      if (!map[ind]) map[ind] = { capital: 0, changeSum: 0, count: 0 };
      map[ind].capital   += r['資金(億)'] ?? 0;
      map[ind].changeSum += r['漲跌幅']   ?? 0;
      map[ind].count++;
    });

    const entries = Object.entries(map).map(([ind, v]) => ({
      ind,
      capital:   v.capital,
      avgChange: v.count ? v.changeSum / v.count : 0,
    }));

    const inflow  = entries.filter(v => v.avgChange > 0)
                           .sort((a, b) => b.capital - a.capital)
                           .slice(0, 5);
    const outflow = entries.filter(v => v.avgChange <= 0)
                           .sort((a, b) => b.capital - a.capital)
                           .slice(0, 5);

    const maxCap = Math.max(...entries.map(v => v.capital), 1);

    function renderList(list, cls) {
      if (!list.length) return '<div class="panel-empty">無資料</div>';
      return list.map(v => {
        const pct  = Math.round((v.capital / maxCap) * 100);
        const sign = cls === 'in' ? '▲' : '▼';
        return `<div class="flow-item" data-ind="${encodeURIComponent(v.ind)}">
          <div class="flow-name">${v.ind}</div>
          <div class="flow-bar-wrap"><div class="flow-bar bar-${cls}" style="width:${pct}%"></div></div>
          <div class="flow-val ${cls}">${sign}${v.capital.toFixed(1)}億</div>
        </div>`;
      }).join('');
    }

    document.getElementById('inflow-list').innerHTML  = renderList(inflow,  'in');
    document.getElementById('outflow-list').innerHTML = renderList(outflow, 'out');

    // Attach tooltip events
    document.querySelectorAll('.flow-item[data-ind]').forEach(el => {
      el.addEventListener('mouseenter', e => showIndTooltip(e, decodeURIComponent(el.dataset.ind)));
      el.addEventListener('mousemove',  e => moveTooltip(e));
      el.addEventListener('mouseleave', hideIndTooltip);
    });
  }

  // ── Sorting ──
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      sortDir = sortCol === col ? (sortDir === 'asc' ? 'desc' : 'asc') : 'desc';
      sortCol = col;
      document.querySelectorAll('thead th').forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
      renderTable();
    });
  });

  // ── Ticker ──
  function startTicker() {
    clearInterval(tickerHandle);
    tickerHandle = setInterval(() => {
      if (isPaused) return;
      countdown--;
      countdownEl.textContent = countdown;
      if (countdown <= 0) fetchStocks();
    }, 1000);
  }

  // ── Controls ──
  btnToggle.addEventListener('click', () => {
    isPaused = !isPaused;
    btnToggle.textContent = isPaused ? '▶ 繼續' : '⏸ 暫停';
    btnToggle.className   = isPaused ? 'btn btn-resume' : 'btn btn-pause';
    if (!isPaused) { countdown = +intervalSel.value; countdownEl.textContent = countdown; }
  });
  btnNow.addEventListener('click', () => {
    isPaused = false;
    btnToggle.textContent = '⏸ 暫停';
    btnToggle.className   = 'btn btn-pause';
    fetchStocks();
  });
  intervalSel.addEventListener('change', () => { countdown = +intervalSel.value; countdownEl.textContent = countdown; });
  filterInd.addEventListener('change', renderTable);
  searchInput.addEventListener('input', renderTable);

  [fChangeEn, fItufEn, fYoyEn, fYoy1En].forEach((cb, i) => {
    const ids = ['fl-change','fl-ituf','fl-yoy','fl-yoy1'];
    cb.addEventListener('change', () => {
      document.getElementById(ids[i]).classList.toggle('active', cb.checked);
      renderTable();
    });
  });
  [fChangeVal, fYoyVal, fYoy1Val].forEach(inp => inp.addEventListener('input', renderTable));

  // ── Industry tooltip ──
  const ttEl    = document.getElementById('ind-tooltip');
  const ttTitle = document.getElementById('tt-title');
  const ttTable = document.getElementById('tt-table');

  function showIndTooltip(e, ind) {
    const stocks = allData.filter(r => r['產業類型'] === ind);
    ttTitle.textContent = ind;
    ttTable.innerHTML = stocks.map(r => {
      const chg = r['漲跌幅'] ?? 0;
      const cls = chg > 0 ? 'pos' : chg < 0 ? 'neg' : 'zero';
      const sign = chg > 0 ? '+' : '';
      return `<tr>
        <td>${r['代號']}</td>
        <td>${r['名稱']}</td>
        <td class="${cls}">${sign}${chg.toFixed(2)}%</td>
      </tr>`;
    }).join('');
    moveTooltip(e);
    ttEl.classList.add('visible');
  }

  function moveTooltip(e) {
    const pad = 12;
    const W = ttEl.offsetWidth  || 210;
    const H = ttEl.offsetHeight || 120;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    if (x + W > window.innerWidth  - 8) x = e.clientX - W - pad;
    if (y + H > window.innerHeight - 8) y = e.clientY - H - pad;
    ttEl.style.left = x + 'px';
    ttEl.style.top  = y + 'px';
  }

  function hideIndTooltip() { ttEl.classList.remove('visible'); }

  // ── Init ──
  fetchStocks();
  startTicker();
</script>
</body>
</html>
